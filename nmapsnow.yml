- name: Gather Facts on remaining hosts using Windows Credentials
  hosts: unreachable_hosts_2
  gather_facts: false

  vars:
    ansible_user: "{{ ansible_user_3 }}"
    ansible_password: "{{ ansible_pass_3 }}"

  tasks:
    - name: Get Hostname
      ansible.builtin.raw: '[System.Net.Dns]::GetHostEntry($env:computername).HostName'
      register: hostname
      changed_when: hostname.rc > 0
      timeout: 30

    - name: Get OS
      ansible.builtin.raw: (Get-ItemProperty 'HKLM:\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion').ProductName
      register: os
      changed_when: os.rc > 0
      timeout: 30

    - name: Get IP
      ansible.builtin.raw: Get-NetIPAddress -AddressFamily IPv4 | Where-Object {$_.InterfaceAlias -NotLike '*Loopback*'} | Select-Object -ExpandProperty IPAddress
      register: ip_address
      changed_when: ip_address.rc > 0
      timeout: 30

    - name: Get cores
      ansible.builtin.raw: (Get-CimInstance Win32_ComputerSystem).NumberOfLogicalProcessors
      register: cores
      changed_when: cores.rc > 0
      timeout: 30

    - name: Update SNOW CMDB
      servicenow.itsm.configuration_item:
        state: present
        name: "{{ hostname.stdout }}"
        ip_address: "{{ ip_address.stdout | default(omit) }}"
        sys_class_name: cmdb_ci_linux_server
        other:
          fqdn: "{{ hostname.stdout | default(omit) }}"
          os_domain: "{{ os.stdout | default(omit) }}"
          host_name: "{{ hostname.stdout | default(omit) }}"
          cpu_count: "{{ cores.stdout | default(omit) }}"
      delegate_to: localhost

    - name: Set Fact
      ansible.builtin.set_fact:
        ssh_connection: true
      when: hostname.rc == 0

    - name: Create 'unreachable_hosts_final' group
      ansible.builtin.add_host:
        name: "{{ item }}"
        groups: unreachable_hosts_final
      loop: "{{ ansible_play_hosts_all }}"
      when: hostvars[item]['ssh_connection'] | default(false) == false

    - name: Clear errors so the next play can see these hosts
      ansible.builtin.meta: clear_host_errors

    - name: End play
      ansible.builtin.meta: end_play

- name: Show Hosts Report
  hosts: localhost
  gather_facts: false

  tasks:
    - name: "Consolidate Host version data into a report"
      ansible.builtin.set_fact:
        host_report: |
          {%- set unreachable = groups['unreachable_hosts_final'] -%}
          {%- if unreachable %}
          UNREACHABLE HOSTS
          =================
          {% for host in unreachable | sort %}
          - {{ host }}
          {% endfor %}
          {%- endif %}

    - name: "Emit formatted report to console"
      ansible.builtin.debug:
        msg: "{{ host_report.split('\n') }}"
