---
- name: Gather Facts using Credentials Set 1
  hosts: ssh
  gather_facts: false

  vars:
    ansible_user: "{{ ansible_user_1 }}"
    ansible_password: "{{ ansible_pass_1 }}"

  tasks:
    - name: Quick SSH Discovery Test
      ansible.builtin.command: >
        timeout 15s sshpass -p '{{ ansible_password }}'
        ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no
        -o PreferredAuthentications=password -o PubkeyAuthentication=no
        {{ ansible_user }}@{{ inventory_hostname }} "cat /etc/os-release"
      delegate_to: localhost
      register: ssh_output
      no_log: true

    - name: Set Fact
      ansible.builtin.set_fact:
        ssh_connection: true
      when: ssh_output.rc == 0

    - name: Create 'unreachable_hosts' group
      ansible.builtin.add_host:
        name: "{{ item }}"
        groups: unreachable_hosts
      loop: "{{ ansible_play_hosts_all }}"
      when: hostvars[item]['ssh_connection'] | default(false) == false

    - name: Get Hostname
      ansible.builtin.raw: cat /proc/sys/kernel/hostname
      register: hostname
      changed_when: hostname.rc > 0
      timeout: 30

    - name: Get OS
      ansible.builtin.raw: cat /etc/redhat-release
      register: os
      changed_when: os.rc > 0
      timeout: 30

    - name: Get IP
      ansible.builtin.raw: ip -4 -o addr show scope global | awk '{split($4,a,"/"); print a[1]}' | grep -v '[#]' | head -2 | tail -1
      register: ip_address
      changed_when: ip_address.rc > 0
      timeout: 30

    - name: Get cores
      ansible.builtin.raw: cat /proc/cpuinfo 2>/dev/null | grep '^processor\s*.' | wc -l
      register: cores
      changed_when: cores.rc > 0
      timeout: 30

    - name: Update SNOW CMDB
      servicenow.itsm.configuration_item:
        state: present
        name: "{{ hostname.stdout }}"
        ip_address: "{{ ip_address.stdout | default(omit) }}"
        sys_class_name: cmdb_ci_linux_server
        other:
          fqdn: "{{ hostname.stdout | default(omit) }}"
          os_domain: "{{ os.stdout | default(omit) }}"
          host_name: "{{ hostname.stdout | default(omit) }}"
          cpu_count: "{{ cores.stdout | default(omit) }}"
      delegate_to: localhost

    - name: Clear errors so the next play can see these hosts
      ansible.builtin.meta: clear_host_errors

    - name: End play
      ansible.builtin.meta: end_play

