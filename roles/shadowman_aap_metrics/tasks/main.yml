---
- name: Pull AAP Metrics
  community.postgresql.postgresql_query:
    login_db: awx
    query: SELECT * FROM public.main_hostmetric ORDER BY last_automation DESC
    login_host: "{{ db_host }}"
    login_user: "{{ db_user }}"
    login_password: "{{ db_password }}"
  register: aapmetrics

- name: Host Automated
  ansible.builtin.debug:
    msg: "{{ aapmetrics.rowcount }}"

- name: Display Host Automated Information
  ansible.builtin.debug:
    msg: "{{ aapmetrics.query_result }}"

- name: Write CSV file
  ansible.builtin.copy:
    dest: /tmp/host_metrics.csv
    content: |
      hostname,first_automation,last_automation,last_deleted,automated_counter,deleted_counter,deleted,used_in_inventories,id
      {% for item in aapmetrics.query_result %}
      {{ item.hostname }},{{ item.first_automation }},{{ item.last_automation }},{{ item.last_deleted }},{{ item.automated_counter }},{{ item.deleted_counter }},{{ item.deleted }},{{ item.used_in_inventories }},{{ item.id }}
      {% endfor %}
  delegate_to: localhost

- name: Pull AAP Metrics for month
  community.postgresql.postgresql_query:
    login_db: awx
    query: SELECT * FROM public.main_hostmetric WHERE last_automation >= '{{ ansible_date_time.year }}-{{ ansible_date_time.month }}-01 00:00:00' AND last_automation <= '{{ ansible_date_time.year }}-{{ ansible_date_time.month }}-{{ ansible_date_time.day }} {{ ansible_date_time.time }}' ORDER BY last_automation DESC
    login_host: "{{ db_host }}"
    login_user: "{{ db_user }}"
    login_password: "{{ db_password }}"
  register: aapmetricsmonth

- name: Host Automated Month
  ansible.builtin.debug:
    msg: "{{ aapmetricsmonth.rowcount }}"

- name: Display Host Month Automated Information
  ansible.builtin.debug:
    msg: "{{ aapmetricsmonth.query_result }}"
